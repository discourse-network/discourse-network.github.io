#        You can also provide more details about the site, upcoming events, 
#        or anything else you'd like visitors to see while navigating the site.
#        
#        Feel free to customize the content to match your theme and goals.

# Page defaults
defaults:
  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page  # Set layout for pages
      author_profile: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# In _config.yml
minimal_mistakes_skin: default
sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      css: "/assets/css/main.css"
