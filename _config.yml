title: "DisCouRSE: Developing a Community of Leaders"
masthead_title: "Developing a Community of Leaders"
logo: "assets/images/DisCouRSE-Logo-Light.svg"
email: 
description: >- # this means to ignore newlines until "github:"
   DisCouRSE is a UKRI-funded Network+ project that will encourage and support the development of leaders
   across all digital Research Technical Professional (dRTP) roles, resulting in an empowered and connected
   community equipped to shape the future of digital research. 
github:
  is_project_page: false
search: true
lunr:
  search_within_pages: true
locale: "en-GB"
timezone: "Europe/London"
date_format: "%-d %B %Y"

# Navigation
navigation:
  header: main

# Only some pages use a left sidebar
sidebar:
  disable: true

# Our posts are all news stories, whatever the category
permalink: /news/:year/:month/:day/:slug/

collections:
  team:
    output: true
    permalink: /team/:name/
  events:
    output: true
    permalink: /:collection/:path/
  projects:
    output: true
    permalink: /:collection/:path/

feed:
  posts_limit: 20
  collections:
    - events
atom_feed:
  path: "/feed/events.xml"

# This is needed or pages for future events are not generated!
future: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

include:
  - _pages

# Plugins (previously gems):
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jemoji
  - jekyll-remote-theme

author:
#  name: "DisCouRSE"
#  avatar: "/assets/images/bio-photo.jpg"
#  bio: "DisCouRSE: Developing a Community of Leaders"
#  links:
#    - label: "Website"
#      icon: "fas fa-fw fa-link"
#      url: "https://"
