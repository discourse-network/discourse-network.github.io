title: "DisCouRSE: Developing a Community of Leaders"
logo: "assets/images/DisCouRSE-Logo-Light.svg"
email: 
description: >- # this means to ignore newlines until "baseurl:"
   DisCouRSE is a UKRI-funded Network+ project that will encourage and support the development of leaders
   across all digital Research Technical Professional (dRTP) roles, resulting in an empowered and connected
   community equipped to shape the future of digital research. 
github:
  is_project_page: false
search: true

# Navigation
navigation:
  header: main

sidebar:
  disable: true
  
collections:
  team:
    output: true
    permalink: /team/:name/
  events:
    output: true
    permalink: /:collection/:path/

feed:
  posts_limit: 20
  collections:
    - events
atom_feed:
  path: "/feed/events.xml"

# This is needed or pages for future events are not generated!
future: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

include:
  - _includes/head_custom.html

# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Plugins (previously gems:):
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
#  name: "DisCouRSE"
