#      icon: "fab fa-fw fa-twitter-square"
#      url: "https://twitter.com/"

copyright: "DisCouRSE, which has received funding through the UKRI Digital Research Infrastructure Programme"

footer:
  since: "2025"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/company/discourse-network"
    - label: "Code of Conduct"
      url: "/code-of-conduct"
    - label: "Contact us"
      url: "/contact"
#    - label: "Twitter"
#      icon: "fab fa-fw fa-twitter-square"
#      url: "https://twitter.com/"
#    - label: "GitHub"
#      icon: "fab fa-fw fa-github"
#      url: "https://github.com/"
#    - label: "Instagram"
#      icon: "fab fa-fw fa-instagram"
#      url: "https://instagram.com/"

# Sidebar enabled and custom content (text widget)
sidebar: false

## Sidebar content for the widgets
#sidebar_widgets:
#  - text:
#      title: "Welcome to DisCouRSE"
#      content: |
#        This is the sidebar where you can include some introductory text.
#        You can also provide more details about the site, upcoming events, 
#        or anything else you'd like visitors to see while navigating the site.
#        
#        Feel free to customize the content to match your theme and goals.

# Page defaults
defaults:
  # Static pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: default  # Set layout for pages
      author_profile: false
  # News posts in _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      share: true
      sidebar: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

minimal_mistakes_skin: default
sass:
  style: compressed
