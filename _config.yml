# Page defaults
defaults:
  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page  # Set layout for pages
      author_profile: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
