<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  {% include head.html %}
</head>

<body>
  <!-- Header section -->
  <header>
    {% include navigation.html %}
  </header>

  <!-- Sidebar -->
  {% if page.sidebar %}
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>
  {% endif %}

  <!-- Main Content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer section -->
  <footer>
    {% include footer.html %}
  </footer>
</body>

</html>
